<ion-content>
  <div class="tndr1RacingBanner">
  </div>


  <div class="teamContentComponent">
    <ion-item>
      <h1>TNDR1 Racing Team</h1>
    </ion-item>
    <div class="about">
      <article class="aboutArticle">
        <section *ngFor="let text of teamAbout">
          <p class="aboutText aboutTextP">
            {{text}}
          </p>
        </section>
      </article>
    </div>

    <ion-item>
      <h1>Drivers</h1>
    </ion-item>

    <ion-list class="driverList">
      <div *ngFor="let driver of teamDrivers" style="width: 60%;">
        <div class="driverImageContainer">
          <p class="driverNumber">#{{driver.number}}</p>
          <p class="driverName">{{driver.name}}</p>
          <img class="driverImage" src="{{driver.image}}" />
        </div>
      </div>

    </ion-list>

    <div class="teamMediaComponent">

      <div class="playlistComponent">
        <ion-item>
          <h1>Team PlayList</h1>
        </ion-item>

        <div>

          <p class="mediaComponentText">{{playlistDescription}} </p>
          <iframe data-testid="embed-iframe" class="playlistIframe"
            src="https://open.spotify.com/embed/playlist/6zUjAR3XgCwtcfiselAYsE?utm_source=generator" width="100%"
            height="352" frameBorder="0" allowfullscreen=""
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
      </div>
      <div class="introComponent">
        <ion-item>
          <h1>Team Intro Video</h1>
        </ion-item>

        <div>

          <p class="mediaComponentText">{{teamIntroDescription}}</p>

          <iframe class="introVidIframe" [src]="teamIntroVideo | safe" title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen>
          </iframe>

        </div>
      </div>
    </div>

    <ion-item>
      <h1>Gallery</h1>
      <div class="titleSeparator"></div>
    </ion-item>

    <ion-list class="driverList">
      <div *ngFor="let image of teamGallery" class="imageContainer">
        <img class="galleryImage" src="{{image.image}}" (click)="openImage(image)" />
        <p class="">{{image.name}}</p>
      </div>

    </ion-list>

    <div class="bottomBanner"> 
      <img src="../../assets/tndr1/logo.png" alt="">
    </div>

  </div>

</ion-content>

<ion-modal [isOpen]="showModal" (didDismiss)="showModal = false">
  <ng-template>
    <div style="display: flex; flex-direction: column;">
      <ion-header class="gradientBG">
        <ion-toolbar>
          <ion-buttons slot="end">
            <ion-button (click)="showModal = false">
              <ion-icon class="closeIcon" name="close-outline"></ion-icon>
            </ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <div class="image-wrapper">
        <img [src]="selectedImage" />
        <p class="galleryTitle">{{selectedImageName}}</p>

        <p class="galleryText">{{selectedImageText}}</p>
      </div>
    </div>
  </ng-template>
</ion-modal>
