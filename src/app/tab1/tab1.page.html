<ion-content [fullscreen]="true">

  <div class="aboutComponent">
    <app-main-card class="aboutPeeker" [animate]="animate"></app-main-card>

    <div class="skillsPart" > 
      <!-- OFFER  -->
      <ion-item>
        <h1>OFFER</h1>
      </ion-item>
      
      <ion-item lines="none" >
        <article *ngIf="animate">
          <p class="aboutTextP" *ngFor="let text of offerDescription" @slideUp>
            {{text}}
          </p>
        </article>
      </ion-item>


      <div lines="none">
        <p class="toolListTitle">
          My problem solving skills include:
        </p>
        <div style="display: flex; width: 100%; justify-content: space-between;" *ngIf="animate">

          <ion-list style="width: 47%;">

            <div *ngFor="let skill of skillList" >
              <ion-item  class="skillItem" >
                <div class="skillItemContainer" @slideUp>
                  <ion-icon class="skillIcon" name="{{skill.icon}}"></ion-icon>
                    <p>
                      {{skill.name}}
                    </p>
                </div>
              </ion-item>
            </div>
         
          </ion-list>


          <ion-list style="width: 47%;">
            <div *ngFor="let skill of skillList2" >
              <ion-item class="skillItem" >
                  <div class="skillItemContainer" @slideUp>
                    <ion-icon class="skillIcon" name="{{skill.icon}}"></ion-icon>
                    <p>{{skill.name}}?</p>
                  </div>
              </ion-item>
            </div> 
          </ion-list>


        </div>
      </div>
      <!-- END OFFER  -->

      <!-- SKILLS  -->
      <ion-item>
        <h1>TOOLS</h1>
      </ion-item>

      <div lines="none">

        <div style="display: flex; width: 100%; justify-content: space-between;" *ngIf="animate">

          <ion-list style="width: 47%;">
            <p class="toolListTitle">
              My go-to stack:
            </p>
            <ion-item class="toolItem" *ngFor="let tool of toolList">
              <div class="skillItemContainer" @slideUp>
                <ion-icon class="skillIcon" name="{{tool.icon}}"></ion-icon>
                <p>{{tool.name}}</p>
              </div>
            </ion-item>
          </ion-list>



          <ion-list style="width: 47%;">
            <p class="toolListTitle">
              Other relevant tools and software I have experience with:
            </p>
            <ion-item class="toolItem" *ngFor="let tool of otherDevTools">
              <div class="skillItemContainer" @slideUp>
                <ion-icon class="toolIcon" name="{{tool.icon}}"></ion-icon>
                <p style="width: 100%;">{{tool.name}}</p>
              </div>
             
            </ion-item>
          </ion-list>
        </div>
      </div>

      <div lines="none">

        <div style="display: flex; width: 100%; justify-content: space-between;" *ngIf="animate">

          <ion-list style="width: 47%;">
            <p class="toolListTitle">
              Image & Video Editing Tools
            </p>
            <ion-item class="toolItem" *ngFor="let tool of meadiaToolList">
              <div class="skillItemContainer" @slideUp>
                <ion-icon class="skillIcon" name="{{tool.icon}}"></ion-icon>
                <p>{{tool.name}}</p>
              </div>
            </ion-item>
          </ion-list>



          <ion-list style="width: 47%;">
            <p class="toolListTitle">
              Random things I also know how to use:
            </p>
            <ion-item class="toolItem" *ngFor="let tool of otherTools">
              <div class="skillItemContainer" @slideUp>
                <ion-icon class="skillIcon" name="{{tool.icon}}"></ion-icon>
                <p>{{tool.name}}</p>
              </div>
            </ion-item>
          </ion-list>
        </div>
      </div>
      <!-- END SKILLS  -->

    </div>
  </div>
</ion-content>
<!-- </ion-header> -->
